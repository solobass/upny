<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPNY.vc</title>
  <meta name="description" content="UPNY Ventures — university-incubated pre-seed venture capital." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 860px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 40px;
    }

    .logo {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #cccccc;
    }

    .thesis {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 300;
      line-height: 1.85;
      color: #444444;
      letter-spacing: -0.01em;
      max-width: 860px;
      text-align: left;
    }

    .highlight {
      font-weight: 500;
      color: #111111;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999999;
      border: 1px solid #e0e0e0;
      padding: 6px 16px;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <img src="assets/UPNY_Albany_banner.png" alt="UPNY.vc" />
    </div>

    <div class="divider"></div>

    <p class="thesis">
      UPNY Ventures backs incubated deep-tech startups with <span class="highlight">Pre-Seed Capital + GTM Support</span><br />to drive early validation and a fundable path to growth.
    </p>

    <span class="badge">Coming Soon</span>

  </div>
</body>
</html>
